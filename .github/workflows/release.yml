name: Build And Release

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows portable
            os: windows-latest
            artifact_name: windows-portable
            artifact_path: dist/*portable*.exe
            build_command: npx electron-builder --win portable --x64 --publish never
          - name: Linux AppImage
            os: ubuntu-latest
            artifact_name: linux-appimage
            artifact_path: dist/*.AppImage
            build_command: npx electron-builder --linux AppImage --x64 --publish never
          - name: macOS DMG
            os: macos-latest
            artifact_name: macos-dmg
            artifact_path: dist/*.dmg
            build_command: npx electron-builder --mac dmg --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive app version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v.}"
          if [ "$VERSION" = "$TAG" ]; then
            VERSION="${TAG#v}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported tag format: $TAG"
            exit 1
          fi

          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update package.json version
        run: npm version ${{ env.APP_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build Electron app
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
